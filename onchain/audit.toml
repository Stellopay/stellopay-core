# Cargo Audit configuration for StellopayCore
# This file defines advisories that are explicitly ignored with justification.

[advisories]
ignore = [
    # Example: RUSTSEC-2023-0052: `derivative` has a potential vulnerability in its proc-macro
    # Justification: Used by `ark-ec` and `ark-ff` for internal trait derivations. 
    # Not exposed to untrusted input in a way that triggers the vulnerability.
    "RUSTSEC-2023-0052",
]

[database]
# URL of the advisory database
url = "https://github.com/rustsec/advisory-db"
# Path to the advisory database
path = "~/.cargo/advisory-db"

[output]
# Deny all advisories by default (this is what we want for blocking CI)
deny = ["vulnerability", "unmaintained", "unsound", "notice"]
