name: Soroban Smart Contracts CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source $HOME/.cargo/env
    - name: Install Rust target for Soroban
      run: |
        source $HOME/.cargo/env
        rustup target add wasm32v1-none

    # Cache Cargo registry, git sources, and compiled artifacts.
    # The cache key includes the OS, Rust toolchain version, and Cargo.lock hash
    # so it invalidates automatically when dependencies or the toolchain change.
    # Pull-request builds from forks use a read-only fallback key so they cannot
    # poison the trusted-branch cache (security boundary).
    - name: Cache Rust workspace dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          onchain/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('onchain/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install Stellar CLI with Homebrew
      run: |
        brew update
        brew install stellar-cli
        stellar --version
    - name: Build Cargo project
      run: |
        source $HOME/.cargo/env
        cd onchain/contracts/stello_pay_contract
        cargo build --verbose

    - name: Build Soroban contract
      run: |
        source $HOME/.cargo/env
        cd onchain/contracts/stello_pay_contract
        stellar contract build --verbose

    - name: Run Cargo tests
      run: |
        source $HOME/.cargo/env
        cd onchain/contracts/stello_pay_contract
        cargo test --verbose
