# Previous PR/push CI for macOS + stello_pay_contract only lives in
# `.github/workflows/contracts.yml` (Ubuntu, tests, WASM build, coverage).
# This file remains for manual runs without duplicating jobs on every PR.
name: Soroban Smart Contracts CI (manual)

on:
  workflow_dispatch:

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust formatting
        working-directory: onchain
        run: cargo fmt --all --check
