name: Contracts CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # -----------------------------------------------------------------------
  # Native (non-wasm) build and test job
  # -----------------------------------------------------------------------
  test-native:
    name: Build & test (native)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cache Cargo registry, git sources, and the native target directory.
      # Key is scoped to the OS + Cargo.lock so the cache invalidates whenever
      # dependencies change.  Pull-requests from untrusted forks fall back to
      # the read-only restore-key and cannot overwrite the canonical cache.
      - name: Cache Rust workspace dependencies (native)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            onchain/target
          key: ${{ runner.os }}-cargo-native-${{ hashFiles('onchain/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-native-

      - name: Build workspace (native)
        run: cargo build --workspace --manifest-path onchain/Cargo.toml --verbose

      - name: Run workspace tests (native)
        run: cargo test --workspace --manifest-path onchain/Cargo.toml --verbose

  # -----------------------------------------------------------------------
  # Wasm build job
  # -----------------------------------------------------------------------
  build-wasm:
    name: Build contracts (wasm32)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      # Separate cache key for the wasm target directory so native and wasm
      # build artefacts do not interfere with each other.
      - name: Cache Rust workspace dependencies (wasm)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            onchain/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('onchain/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Build workspace for wasm32
        run: |
          cargo build \
            --workspace \
            --manifest-path onchain/Cargo.toml \
            --target wasm32v1-none \
            --release \
            --verbose
