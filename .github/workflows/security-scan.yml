name: Security Scans

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache Cargo registry and git sources so vulnerability-scanning tools
      # (cargo-audit, clippy) do not re-download the entire dependency graph on
      # every run.  The cache key invalidates on Cargo.lock changes.
      - name: Cache Rust workspace dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            onchain/target
          key: ${{ runner.os }}-cargo-security-${{ hashFiles('onchain/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-security-

      - name: Install cargo-audit
        run: |
          cargo install cargo-audit --locked || echo "cargo-audit already installed"

      - name: Run cargo-audit (dependency vulnerability scan)
        run: |
          cargo audit || true

      - name: Run Clippy (static analysis)
        run: |
          cargo clippy --all-targets --all-features -- -D warnings || true

      - name: Security scan summary
        run: |
          echo "Static security scans completed (cargo-audit, clippy)."
